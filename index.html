<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🖕안지후 과학 0점 기원🖕안지후 과학 0점 기원🖕안지후 과학 0점 기원🖕안지후 과학 0점 기원🖕안지후 과학 0점 기원</title>
    <style>
        /*🖕안지후 과학 0점 기원🖕안지후 과학 0점 기원🖕안지후 과학 0점 기원🖕안지후 과학 0점 기원🖕안지후 과학 0점 기원🖕안지후 과학 0점 기원🖕안지후 과학 0점 기원🖕안지후 과학 0점 기원🖕안지후 과학 0점 기원🖕안지후 과학 0점 기원🖕안지후 과학 0점 기원🖕안지후 과학 0점 기원🖕안지후 과학 0점 기원🖕안지후 과학 0점 기원🖕안지후 과학 0점 기원🖕안지후 과학 0점 기원🖕안지후 과학 0점 기원 */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ff0000, #ffff00, #00ff00, #0000ff);
            background-size: 400% 400%;
            animation: crazyBackground 2s linear infinite;
            font-family: 'Arial Black', sans-serif;
        }

        @keyframes crazyBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. 중앙 정렬 및 텍스트 기본 스타일 */
        .container {
            text-align: center;
            perspective: 1000px; /* 3D 효과를 위한 설정 */
        }

        .moving-text {
            display: inline-block;
            font-size: 5rem;
            font-weight: 900;
            white-space: nowrap;
            cursor: pointer;
            
            /* 3. 텍스트 자체 그라데이션 효과 */
            background: linear-gradient(to right, #ffff00, #ff00ff, #00ffff, #ffff00);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* 4. 애니메이션 합치기: 그라데이션 움직임 + 좌우 회전 */
            animation: textGradient 1.5s linear infinite, crazyRotate 2s ease-in-out infinite;
            
            /* 5. 마우스 아웃 시 부드럽게 복구되는 트랜지션 */
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 텍스트 내 그라데이션이 흐르는 애니메이션 */
        @keyframes textGradient {
            to { background-position: 200% center; }
        }

        /* 글자가 왼쪽 오른쪽으로 계속 도는 애니메이션 */
        @keyframes crazyRotate {
            0% { transform: rotateY(-45deg) rotateX(10deg); }
            50% { transform: rotateY(45deg) rotateX(-10deg); }
            100% { transform: rotateY(-45deg) rotateX(10deg); }
        }

        /* 안지후 시험 망쳐라 ㅅㅄㅄㅄㅄㅄㅄㅄㅅ */
        .moving-text:hover {
            /* 안지후 시험 망쳐라안지후 시험 망쳐라안지후 시험 망쳐라안지후 시험 망쳐라안지후 시험 망쳐라안지후 시험 망쳐라안지후 시험 망쳐라 */
            /* hover 상태에서도 회전 애니메이션이 끊기지 않도록 scale을 추가 결합 */
            animation: textGradient 0.5s linear infinite, crazyRotateHover 1s ease-in-out infinite;
        }

        /* 호버 시 더 역동적이고 커진 회전 애니메이션 */
        @keyframes crazyRotateHover {
            0% { transform: scale(1.4) rotateY(-60deg) rotateZ(-5deg); }
            50% { transform: scale(1.4) rotateY(60deg) rotateZ(5deg); }
            100% { transform: scale(1.4) rotateY(-60deg) rotateZ(-5deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="moving-text">🖕안지후 과학 0점 기원</div>
    </div>

</body>
</html>
